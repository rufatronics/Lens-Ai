name: Aga Global Tech - Flet Lens AI
on: [push]

jobs:
  android_build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # ALIGNED WITH FLET 0.84.0 REQUIREMENTS
          flutter-version: '3.41.4'

      - name: Install Flet CLI
        run: pip install flet

      - name: YOLO26 Model Factory
        run: |
          pip install ultralytics numpy==1.26.2
          yolo export model=yolo26n.pt format=tflite int8=True
          mkdir -p assets
          cp $(find . -name "*_int8.tflite") assets/yolo26n.tflite

      - name: Build APK
        run: |
          # 'yes |' handles the interactive prompt that caused the EOFError
          yes | flet build apk \
            --project "Lens AI" \
            --product "Lens AI" \
            --org "tech.agaglobal" \
            --description "Aga Global Sovereignty Vision Intelligence"

      - name: Upload Finalized APK
        uses: actions/upload-artifact@v4
        with:
          name: LensAI-Sovereignty-Edition
          path: build/apk/*.apk
          
