name: Aga Global Tech - Lens AI Stable Build
on: [push]

jobs:
  android_build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Linux headers required for the Flutter engine initialization
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libglu1-mesa-dev mesa-utils xvfb

      # 2. JDK 17 is mandatory for 2026 Android toolchains
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.41.4'

      # 3. Legal Gatekeeper: Auto-accept Google's licenses
      - name: Accept Android Licenses
        run: yes | flutter doctor --android-licenses

      - name: Install Flet CLI & AI Tools
        run: pip install flet ultralytics numpy==1.26.2

      # 4. YOLO26 Synaptic DNA Model Factory
      - name: YOLO26 Model Factory
        run: |
          yolo export model=yolo26n.pt format=tflite int8=True
          mkdir -p assets
          cp $(find . -name "*_int8.tflite") assets/yolo26n.tflite

      # 5. Build the APK using the Serious Python engine
      - name: Build APK
        run: |
          # The Flet CLI will now find the 'opencv-python' mobile wheel
          flet build apk \
            --project "Lens AI" \
            --product "Lens AI" \
            --org "tech.agaglobal" \
            --verbose

      - name: Upload Finalized APK
        uses: actions/upload-artifact@v4
        with:
          name: LensAI-Sovereignty-Edition
          path: build/apk/*.apk
          
