name: Aga Global Tech - Lens AI Build
on: [push]

jobs:
  android_build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # FIX: Install the headers the Doctor is crying about
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libglu1-mesa-dev mesa-utils xvfb

      # JDK 17 is mandatory for 2026 Android builds
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # FIX: Manually install the exact Flutter SDK Flet 0.84.0 wants
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.41.4'

      - name: Install Flet CLI
        run: pip install flet ultralytics numpy==1.26.2

      - name: YOLO26 Model Factory
        run: |
          # Export to INT8 (Synaptic DNA mode)
          yolo export model=yolo26n.pt format=tflite int8=True
          mkdir -p assets
          cp $(find . -name "*_int8.tflite") assets/yolo26n.tflite

      - name: Build APK (Non-Interactive)
        run: |
          # Use printf to force 'yes' into the process if it still asks
          printf 'y\n' | flet build apk \
            --project "Lens AI" \
            --product "Lens AI" \
            --org "tech.agaglobal" \
            --verbose

      - name: Upload Finalized APK
        uses: actions/upload-artifact@v4
        with:
          name: LensAI-Sovereignty-Edition
          path: build/apk/*.apk
          
