name: Aga Global Tech - Lens AI ONNX Build
on: [push]

jobs:
  android_build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libglu1-mesa-dev mesa-utils xvfb

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.41.4'

      - name: Accept Android Licenses
        run: yes | flutter doctor --android-licenses

      - name: Install Build Tools
        run: pip install flet ultralytics numpy==1.26.4

      - name: YOLO26 ONNX Factory
        run: |
          # Exporting to ONNX 640x640 as requested
          yolo export model=yolo26n.pt format=onnx imgsz=640
          mkdir -p assets
          cp yolo26n.onnx assets/yolo26n.onnx

      - name: Build APK
        run: |
          flet build apk \
            --project "Lens AI" \
            --product "Lens AI" \
            --org "tech.agaglobal" \
            --verbose

      - name: Upload Finalized APK
        uses: actions/upload-artifact@v4
        with:
          name: LensAI-Sovereignty-Edition
          path: build/apk/*.apk
         
      - name: Teleport APK to Appetize
        run: |
          # We send the APK directly to Appetize via their API
          # This returns a 'publicKey' which is your app's ID
          RESPONSE=$(curl https://${{ secrets.APPETIZE_TOKEN }}@api.appetize.io/v1/apps \
            -F "file=@build/apk/app-release.apk" \
            -F "platform=android")
          
          echo "App is live! View it here: https://appetize.io/app/$(echo $RESPONSE | jq -r '.publicKey')"
          
